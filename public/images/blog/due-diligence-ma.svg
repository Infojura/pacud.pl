<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Due diligence w transakcjach M&amp;A">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#01023b"/>
      <stop offset="1" stop-color="#0a0b52"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8bd94"/>
      <stop offset="1" stop-color="#ba9a6c"/>
    </linearGradient>
    <pattern id="grid1" width="46" height="46" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M46 0H0V46" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#grid1)"/>
  <circle cx="1000" cy="120" r="360" fill="#1c86c6" fill-opacity="0.06"/>
  <circle cx="120" cy="560" r="260" fill="#ba9a6c" fill-opacity="0.05"/>

  <!-- Ikona: dokumenty pod lupą (badanie due diligence) -->
  <g transform="translate(600 300)" stroke="url(#gold1)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-120" y="-96" width="150" height="196" rx="12" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="-92" y1="-52" x2="0" y2="-52"/>
    <line x1="-92" y1="-16" x2="2" y2="-16"/>
    <line x1="-92" y1="20" x2="-24" y2="20"/>
    <circle cx="46" cy="58" r="66" fill="#01023b"/>
    <circle cx="46" cy="58" r="66"/>
    <line x1="92" y1="104" x2="140" y2="152"/>
  </g>

  <text x="600" y="512" text-anchor="middle" font-family="'Plus Jakarta Sans',Segoe UI,sans-serif" font-size="30" font-weight="800" letter-spacing="6" fill="url(#gold1)">PRAWO GOSPODARCZE</text>
  <text x="600" y="558" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="22" font-weight="500" fill="#ffffff" fill-opacity="0.55">Kancelaria Radosław Pacud</text>
</svg>
